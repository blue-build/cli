---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: apt
    source: ghcr.io/blue-build/modules/apt:pr-523
    if:
      os-release:
        ID:
          - ubuntu
          - debian
    install:
      packages:
        - git
  - type: dnf
    if:
      os-release:
        ID:
          - fedora
          - centos
          - rhel
    install:
      packages:
        - git
  - type: apk
    source: ghcr.io/blue-build/modules/apk:pr-523
    if:
      os-release:
        ID: alpine
    install:
      packages:
        - git
  - type: pacman
    source: ghcr.io/blue-build/modules/pacman:pr-523
    if:
      os-release:
        ID: archlinux
    install:
      packages:
        - git
  - type: zypper
    source: ghcr.io/blue-build/modules/zypper:pr-523
    if:
      os-release:
        ID: opensuse
    install:
      packages:
        - git
